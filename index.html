<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokročilý 3D Editor pro 3D Tisk</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #ui-panel {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 280px; color: #fff; border: 1px solid rgba(255,255,255,0.1);
        }
        h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; color: #aaa; }
        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        button {
            width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer;
            background: #3a3a3a; color: #fff; border: none; border-radius: 6px; font-weight: 600;
            transition: all 0.2s ease;
        }
        button:hover { background: #4a4a4a; }
        button.active { background: #4CAF50; color: white; box-shadow: 0 0 10px rgba(76, 175, 80, 0.5); }
        .row { display: flex; gap: 6px; }
        .row button { flex: 1; }
        input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 8px; box-sizing: border-box;
            background: #2b2b2b; border: 1px solid #444; border-radius: 6px; color: white; font-size: 14px;
        }
        input[type="text"]:focus { outline: none; border-color: #2196F3; }
        #deleteBtn { background: #d32f2f; color: white; }
        #deleteBtn:hover { background: #f44336; }
        #exportBtn { 
            background: #2196F3; color: white; font-weight: bold; margin-bottom: 0;
            font-size: 15px; box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        #exportBtn:hover { background: #1e88e5; }
        #info-box {
            position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7);
            color: #888; padding: 8px 12px; border-radius: 6px; font-size: 11px; pointer-events: none;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <h3>Nástroje úprav</h3>
            <div class="row">
                <button id="mode-translate" class="active">Posun</button>
                <button id="mode-rotate">Rotace</button>
                <button id="mode-scale">Velikost</button>
            </div>
            <button id="deleteBtn">Smazat vybrané</button>
        </div>

        <div class="control-group">
            <h3>Přidat objekty</h3>
            <button id="addCubeBtn">+ Přidat Kostku</button>
            <div style="margin-top: 12px;">
                <input type="text" id="textInput" placeholder="Napiš text zde..." value="3D Tisk">
                <button id="addTextBtn">+ Přidat 3D Text</button>
            </div>
        </div>

        <button id="exportBtn">Exportovat do STL</button>
    </div>

    <div id="info-box">Kliknutím vyber objekt | Tažením myší otáčej kameru | Kolečko zoomuje</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        
        // 1. SCÉNA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x777777));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);
        scene.add(new THREE.GridHelper(30, 30, 0x444444, 0x2b2b2b));

        // 2. KONTROLKY
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        const transformControl = new TransformControls(camera, renderer.domElement);
        scene.add(transformControl); // OPRAVENO

        transformControl.addEventListener('dragging-changed', (event) => {
            orbitControls.enabled = !event.value;
        });

        const objects = [];

        // 3. NAČTENÍ FONTU
        const fontLoader = new FontLoader();
        let loadedFont = null;
        fontLoader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            loadedFont = font;
        });

        // 4. PŘIDÁVÁNÍ
        function addCube() {
            const geom = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set((Math.random() - 0.5) * 4, 1, (Math.random() - 0.5) * 4);
            scene.add(mesh);
            objects.push(mesh);
            transformControl.attach(mesh);
        }

        function addText(textContent) {
            if (!loadedFont || textContent.trim() === '') return;
            const textGeom = new TextGeometry(textContent, {
                font: loadedFont, size: 1.2, height: 0.4, curveSegments: 6, bevelEnabled: false
            });
            textGeom.center();
            const textMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const textMesh = new THREE.Mesh(textGeom, textMat);
            textMesh.position.set(0, 0.6, 0);
            scene.add(textMesh);
            objects.push(textMesh);
            transformControl.attach(textMesh);
        }

        // 5. INTELIGENTNÍ VÝBĚR
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (event) => {
            if (event.clientX < 320 && event.clientY < 400) return; // Kliknutí na UI ignorujeme

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(objects, true);

            if (intersects.length > 0) {
                let hitObject = intersects[0].object;
                while (hitObject.parent && !objects.includes(hitObject)) hitObject = hitObject.parent;
                if (objects.includes(hitObject)) transformControl.attach(hitObject);
            } else {
                if (!transformControl.pointerIsOver) transformControl.detach(); // Ošetření šipek
            }
        });

        // 6. TLAČÍTKA
        document.getElementById('addCubeBtn').addEventListener('click', addCube);
        document.getElementById('addTextBtn').addEventListener('click', () => addText(document.getElementById('textInput').value));
        document.getElementById('deleteBtn').addEventListener('click', () => {
            const activeObj = transformControl.object;
            if (activeObj) {
                transformControl.detach();
                scene.remove(activeObj);
                objects.splice(objects.indexOf(activeObj), 1);
            }
        });

        const modes = { 'mode-translate': 'translate', 'mode-rotate': 'rotate', 'mode-scale': 'scale' };
        Object.keys(modes).forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                transformControl.setMode(modes[id]);
                Object.keys(modes).forEach(mId => document.getElementById(mId).classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        // 7. EXPORT
        document.getElementById('exportBtn').addEventListener('click', () => {
            const currentAttached = transformControl.object;
            transformControl.detach(); 

            const exportScene = new THREE.Scene();
            objects.forEach(obj => exportScene.add(obj.clone()));

            const exporter = new STLExporter();
            const result = exporter.parse(exportScene, { binary: true });
            const blob = new Blob([result], { type: 'application/octet-stream' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'muj_3d_model.stl';
            link.click();

            if (currentAttached) transformControl.attach(currentAttached);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 8. ANIMACE
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();
        addCube();
    </script>
</body>
</html>
