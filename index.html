<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametrický 3D Generátor s Historií</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e1e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        canvas { display: block; }
        
        .panel {
            position: absolute; top: 15px; z-index: 100;
            background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            border: 1px solid rgba(255,255,255,0.1); width: 320px; box-sizing: border-box;
            max-height: 95vh; overflow-y: auto;
        }
        
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        
        #ui-panel { left: 15px; width: 260px;}
        #properties-panel { right: 15px; display: block; /* V parametrickém editoru je pravý panel zobrazen vždy */ }
        
        h3 { margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #4CAF50; border-bottom: 1px solid #444; padding-bottom: 8px;}
        .section-title { font-size: 12px; color: #aaa; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;}
        
        button {
            width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer;
            background: #3a3a3a; color: #fff; border: none; border-radius: 6px; font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background: #4a4a4a; }
        
        #undoBtn { background: #ff9800; color: white; margin-bottom: 15px;}
        #undoBtn:hover { background: #f57c00; }
        
        .template-btn { background: #2c3e50; border: 1px solid #34495e; text-align: left; padding: 12px; }
        .template-btn:hover { background: #34495e; border-color: #2196F3;}
        .template-btn span { display: block; font-size: 11px; color: #999; margin-top: 4px; font-weight: normal;}
        
        #saveTplBtn { background: #1976d2; font-size: 12px; margin-top: 10px;}
        #saveTplBtn:hover { background: #1565c0; }

        /* Styly pro vlastní šablony */
        .custom-tpl-item { display: flex; gap: 5px; margin-bottom: 8px;}
        .custom-tpl-item .template-btn { flex-grow: 1; margin-bottom: 0; padding: 8px 12px; }
        .custom-tpl-item .del-btn { width: 36px; background: #d32f2f; margin-bottom: 0; padding: 0; display: flex; align-items: center; justify-content: center; }
        .custom-tpl-item .del-btn:hover { background: #b71c1c; }
        
        #exportBtn { background: #2196F3; color: white; font-weight: bold; font-size: 15px; margin-top: 10px; box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4); }
        #exportBtn:hover { background: #1976d2; }
        
        .param-group { margin-bottom: 12px; }
        .param-group label { display: flex; justify-content: space-between; font-size: 12px; color: #ddd; margin-bottom: 4px; }
        .param-group input[type="range"] { width: 100%; cursor: pointer; }
        .param-group input[type="text"] { 
            width: 100%; padding: 8px; box-sizing: border-box; background: #111; 
            border: 1px solid #444; border-radius: 4px; color: white; font-family: inherit;
        }
        
        #info-box {
            position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7);
            color: #ccc; padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel" class="panel">
        <button id="undoBtn">↩ Krok zpět (Ctrl+Z)</button>

        <h3>Základní Šablony</h3>
        <button class="template-btn" onclick="loadTemplate('classic')">
            Klasická Klíčenka
            <span>60x20 mm, text uprostřed, dírka vpravo</span>
        </button>
        <button class="template-btn" onclick="loadTemplate('large')">
            Velká Jmenovka (Dveře)
            <span>100x40 mm, velký text, bez dírky</span>
        </button>
        <button class="template-btn" onclick="loadTemplate('tag')">
            Štítek na obojek
            <span>40x15 mm, malý text, dírka blízko kraje</span>
        </button>

        <button id="saveTplBtn">+ Uložit aktuální jako šablonu</button>
        <div id="custom-templates" style="margin-top: 10px;">
            </div>

        <button id="exportBtn">⬇ Stáhnout STL</button>
    </div>

    <div id="properties-panel" class="panel">
        <h3>Parametry Štítku</h3>
        
        <div class="param-group">
            <label>Nápis: <input type="text" id="p_text" value="Klíčenka"></label>
        </div>

        <div class="section-title">Rozměry podložky</div>
        <div class="param-group">
            <label>Šířka (mm): <span id="v_width">60</span></label>
            <input type="range" id="p_width" min="20" max="150" value="60">
        </div>
        <div class="param-group">
            <label>Výška (mm): <span id="v_height">20</span></label>
            <input type="range" id="p_height" min="10" max="80" value="20">
        </div>
        <div class="param-group">
            <label>Tloušťka podložky (mm): <span id="v_depth">3</span></label>
            <input type="range" id="p_depth" min="1" max="10" step="0.5" value="3">
        </div>

        <div class="section-title">Otvor na kroužek (Vpravo)</div>
        <div class="param-group">
            <label>Poloměr dírky (mm): <span id="v_holeRad">3</span></label>
            <input type="range" id="p_holeRad" min="0" max="10" step="0.5" value="3">
            <small style="color:#888; font-size:10px;">(0 = žádná dírka)</small>
        </div>
        <div class="param-group">
            <label>Vzdálenost od kraje: <span id="v_holeOff">6</span></label>
            <input type="range" id="p_holeOff" min="2" max="20" value="6">
        </div>

        <div class="section-title">Nastavení Textu</div>
        <div class="param-group">
            <label>Velikost textu: <span id="v_textSize">10</span></label>
            <input type="range" id="p_textSize" min="5" max="30" value="10">
        </div>
        <div class="param-group">
            <label>Tloušťka písma (3D): <span id="v_textDepth">2</span></label>
            <input type="range" id="p_textDepth" min="0.5" max="10" step="0.5" value="2">
        </div>
        <div class="param-group">
            <label>Posun textu X (L/P): <span id="v_textX">-5</span></label>
            <input type="range" id="p_textX" min="-50" max="50" value="-5">
        </div>
        <div class="param-group">
            <label>Posun textu Y (N/D): <span id="v_textY">0</span></label>
            <input type="range" id="p_textY" min="-30" max="30" value="0">
        </div>
    </div>

    <div id="info-box">Kamera: Tažení myší | Zoom: Kolečko | Undo: Ctrl+Z</div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        
        // --- SCÉNA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -50, 100); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(50, 50, 100);
        scene.add(dirLight);
        const dirLight2 = new THREE.DirectionalLight(0x4444ff, 0.5); 
        dirLight2.position.set(-50, -50, -50);
        scene.add(dirLight2);

        scene.add(new THREE.GridHelper(200, 20, 0x444444, 0x2b2b2b));

        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;

        const keychainGroup = new THREE.Group();
        scene.add(keychainGroup);

        const fontLoader = new FontLoader();
        let loadedFont = null;
        fontLoader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            loadedFont = font;
            window.loadTemplate('classic'); 
        });

        // --- PARAMETRY A HISTORIE (UNDO) ---
        const params = {
            text: "Klíčenka", width: 60, height: 20, depth: 3,
            holeRad: 3, holeOff: 6, textSize: 10, textDepth: 2, textX: -5, textY: 0
        };

        const historyStack = [];

        // Uloží kompletní stav před změnou
        function saveState() {
            // Udržujeme historii na max 50 krocích, ať neplníme paměť
            if (historyStack.length > 50) historyStack.shift();
            historyStack.push(JSON.parse(JSON.stringify(params)));
        }

        // Krok zpět
        function undo() {
            if (historyStack.length === 0) return;
            const prevState = historyStack.pop();
            Object.assign(params, prevState); // Zkopírujeme hodnoty z paměti zpět do params
            updateUIFromParams(); // Změníme polohy posuvníků podle čísel
            generateKeychain(); // Přegenerujeme 3D
        }

        // --- GENERÁTOR ---
        function generateKeychain() {
            if (!loadedFont) return;

            while(keychainGroup.children.length > 0){ 
                const child = keychainGroup.children[0];
                child.geometry.dispose();
                child.material.dispose();
                keychainGroup.remove(child); 
            }

            const shape = new THREE.Shape();
            const w2 = params.width / 2;
            const h2 = params.height / 2;
            const r = 4; // Pevné zaoblení 4mm

            // Ochrana: aby zaoblení nerozbilo tvar u příliš tenkých štítků
            const safeR = Math.min(r, Math.min(w2, h2));

            shape.moveTo(-w2 + safeR, h2);
            shape.lineTo(w2 - safeR, h2);
            shape.quadraticCurveTo(w2, h2, w2, h2 - safeR);
            shape.lineTo(w2, -h2 + safeR);
            shape.quadraticCurveTo(w2, -h2, w2 - safeR, -h2);
            shape.lineTo(-w2 + safeR, -h2);
            shape.quadraticCurveTo(-w2, -h2, -w2, -h2 + safeR);
            shape.lineTo(-w2, h2 - safeR);
            shape.quadraticCurveTo(-w2, h2, -w2 + safeR, h2);

            if (params.holeRad > 0) {
                const holePath = new THREE.Path();
                const holeX = w2 - params.holeOff; 
                holePath.absarc(holeX, 0, params.holeRad, 0, Math.PI * 2, true);
                shape.holes.push(holePath);
            }

            const extrudeSettings = { depth: params.depth, bevelEnabled: false };
            const tagGeom = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            tagGeom.translate(0, 0, -params.depth / 2); 
            
            const tagMat = new THREE.MeshStandardMaterial({ color: 0xff6b00, roughness: 0.4 }); 
            const tagMesh = new THREE.Mesh(tagGeom, tagMat);
            
            tagMesh.rotation.x = -Math.PI / 2;
            keychainGroup.add(tagMesh);

            if (params.text.trim() !== '') {
                const textGeom = new TextGeometry(params.text, {
                    font: loadedFont, size: params.textSize, height: params.textDepth, curveSegments: 4, bevelEnabled: false
                });

                textGeom.computeBoundingBox();
                const xOffset = -0.5 * (textGeom.boundingBox.max.x - textGeom.boundingBox.min.x);
                const yOffset = -0.5 * (textGeom.boundingBox.max.y - textGeom.boundingBox.min.y);
                
                textGeom.translate(xOffset + params.textX, yOffset + params.textY, 0);

                const textMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 }); 
                const textMesh = new THREE.Mesh(textGeom, textMat);
                
                textMesh.position.z = params.depth / 2;
                textMesh.rotation.x = -Math.PI / 2;
                textMesh.position.y = params.depth / 2;
                
                keychainGroup.add(textMesh);
            }
        }

        // --- PROPOJENÍ UI A PARAMETRŮ ---
        const inputs = ['width', 'height', 'depth', 'holeRad', 'holeOff', 'textSize', 'textDepth', 'textX', 'textY'];
        
        inputs.forEach(id => {
            const el = document.getElementById('p_' + id);
            // Než uživatel začne tahat posuvníkem, uložíme historii
            el.addEventListener('pointerdown', saveState);
            
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('v_' + id).innerText = val;
                params[id] = val; 
                generateKeychain(); 
            });
        });

        const textInput = document.getElementById('p_text');
        textInput.addEventListener('focus', saveState); // Než začne psát
        textInput.addEventListener('input', (e) => {
            params.text = e.target.value;
            generateKeychain();
        });

        document.getElementById('undoBtn').addEventListener('click', undo);
        
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
        });

        // --- SYSTÉM ŠABLON (Přednastavené i Vlastní) ---
        const customTemplates = [];

        window.loadTemplate = function(type) {
            saveState(); // Uložíme krok, kdyby chtěl uživatel vzít vložení šablony zpět

            if (type === 'classic') {
                applyTemplateValues("Klíčenka", 60, 20, 3, 3, 6, 10, 2, -5, 0);
            } else if (type === 'large') {
                applyTemplateValues("JMENOVKA", 100, 40, 2, 0, 0, 15, 1, 0, 0); 
            } else if (type === 'tag') {
                applyTemplateValues("MAX", 40, 15, 2, 2.5, 4, 6, 1.5, -4, 0);
            }
        };

        function applyTemplateValues(txt, w, h, d, hR, hO, tS, tD, tX, tY) {
            params.text = txt; params.width = w; params.height = h; params.depth = d;
            params.holeRad = hR; params.holeOff = hO; params.textSize = tS; params.textDepth = tD;
            params.textX = tX; params.textY = tY;
            
            updateUIFromParams();
            generateKeychain();
            
            camera.position.set(0, 80, 0);
            camera.lookAt(0,0,0);
        }

        // Nastaví posuvníky v HTML na hodnoty ze současného objektu `params`
        function updateUIFromParams() {
            document.getElementById('p_text').value = params.text;
            inputs.forEach(id => {
                document.getElementById('p_' + id).value = params[id];
                document.getElementById('v_' + id).innerText = params[id];
            });
        }

        // -- VLASTNÍ ŠABLONY --
        document.getElementById('saveTplBtn').addEventListener('click', () => {
            const name = prompt("Jak chceš tuto šablonu pojmenovat?", "Moje štítky");
            if (!name) return;

            customTemplates.push({
                id: Date.now(),
                name: name,
                // Uložíme kopii aktuálního nastavení parametrů
                savedParams: JSON.parse(JSON.stringify(params)) 
            });
            renderCustomTemplates();
        });

        function renderCustomTemplates() {
            const container = document.getElementById('custom-templates');
            container.innerHTML = '';
            
            customTemplates.forEach(tpl => {
                const wrapper = document.createElement('div');
                wrapper.className = 'custom-tpl-item';

                const btn = document.createElement('button');
                btn.className = 'template-btn';
                btn.innerHTML = `★ ${tpl.name}<span>${tpl.savedParams.width}x${tpl.savedParams.height} mm</span>`;
                btn.onclick = () => {
                    saveState();
                    Object.assign(params, tpl.savedParams);
                    updateUIFromParams();
                    generateKeychain();
                };
                wrapper.appendChild(btn);

                const delBtn = document.createElement('button');
                delBtn.className = 'del-btn';
                delBtn.innerText = '✖';
                delBtn.onclick = () => {
                    if(confirm("Smazat vlastní šablonu?")) {
                        const index = customTemplates.indexOf(tpl);
                        if (index > -1) customTemplates.splice(index, 1);
                        renderCustomTemplates();
                    }
                };
                wrapper.appendChild(delBtn);

                container.appendChild(wrapper);
            });
        }

        // --- EXPORT ---
        document.getElementById('exportBtn').addEventListener('click', () => {
            const exporter = new STLExporter();
            const result = exporter.parse(keychainGroup, { binary: true });
            const blob = new Blob([result], { type: 'application/octet-stream' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'klicenka_' + params.text + '.stl';
            link.click();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
